<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jhonny Dev | Login</title>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>
    :root {
        --cor-primaria: #00fff2;
        --cor-secundaria: #ff0080;
        --cor-verde: #00ff88;
    }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    #particles-js {
        position: fixed;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        z-index: -2;
        background: linear-gradient(135deg, #050505 0%, #10101a 50%, #0a0e23 100%);
    }
    .bg-overlay {
        position: fixed;
        width: 100%;
        height: 100%;
        top:0;
        left:0;
        z-index: -1;
        background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.7) 100%);
    }

    body {
        color: white;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    .login-container {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(0, 255, 255, 0.2);
        padding: 50px 40px;
        border-radius: 25px;
        width: 380px;
        text-align: center;
        box-shadow: 0 10px 50px rgba(0, 255, 242, 0.15);
        animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
        100% { transform: translateY(0px); }
    }

    .login-container h1 {
        font-size: 2.5rem;
        margin-bottom: 10px;
        background: linear-gradient(90deg, var(--cor-primaria), var(--cor-verde));
        -webkit-background-clip: text;
        color: transparent;
        text-shadow: 0 0 20px rgba(0,255,242,0.3);
    }

    .subtitle {
        color: #aaa;
        margin-bottom: 30px;
        font-size: 0.9rem;
    }

    input {
        width: 100%;
        padding: 15px;
        margin: 8px 0;
        border: none;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.08);
        color: white;
        font-size: 1rem;
        border: 1px solid transparent;
        transition: 0.3s;
    }
    input:focus {
        outline: none;
        border-color: var(--cor-primaria);
        box-shadow: 0 0 15px rgba(0,255,242,0.2);
    }

    #captchaText {
        background: #000;
        color: #0f0;
        font-family: monospace;
        font-size: 1.5rem;
        padding: 10px;
        border-radius: 8px;
        margin: 15px 0;
        letter-spacing: 8px;
        user-select: none;
        border: 1px solid #333;
    }

    .btn-main {
        width: 100%;
        padding: 15px;
        margin-top: 10px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(90deg, var(--cor-verde), var(--cor-primaria));
        color: black;
        font-weight: bold;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 5px 20px rgba(0,255,136,0.3);
    }
    .btn-main:hover {
        transform: scale(1.02);
        box-shadow: 0 8px 30px rgba(0,255,136,0.5);
    }

    .btn-google {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border: none;
        border-radius: 12px;
        background: rgba(255,255,255,0.1);
        color: white;
        font-weight: 500;
        font-size: 0.95rem;
        cursor: pointer;
        border: 1px solid #444;
        transition: 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }
    .btn-google i {
        color: #ea4335;
        font-size: 1.2rem;
    }
    .btn-google:hover {
        background: rgba(255,255,255,0.15);
        border-color: #ea4335;
    }

    .divider {
        margin: 20px 0;
        color: #555;
        position: relative;
    }
    .divider::before, .divider::after {
        content: '';
        position: absolute;
        top: 50%;
        width: 40%;
        height: 1px;
        background: #333;
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .link {
        margin-top: 15px;
        display: inline-block;
        color: var(--cor-primaria);
        cursor: pointer;
        font-size: 0.9rem;
        text-decoration: none;
    }
    .link:hover {
        text-decoration: underline;
    }

    @media (max-width: 400px) {
        .login-container {
            width: 90%;
            padding: 40px 25px;
        }
    }
</style>
</head>
<body>

<div id="particles-js"></div>
<div class="bg-overlay"></div>

<div class="login-container">
    <h1>Jhonny.Dev</h1>
    <p class="subtitle">Acesse o painel de serviços</p>

    <input id="email" placeholder="📧 Email">
    <input id="senha" type="password" placeholder="🔒 Senha">
    <input id="confirmar" type="password" placeholder="🔁 Confirmar senha">

    <p id="captchaText"></p>
    <input id="captchaInput" placeholder="Digite o código acima">

    <button class="btn-main" onclick="cadastrar()">📝 Cadastrar</button>
    <button class="btn-main" onclick="login()">🚀 Entrar</button>

    <div class="divider">ou</div>

    <button class="btn-google" onclick="loginGoogle()">
        <i class="fa fa-google"></i> Entrar com Google
    </button>

    <br>
    <span class="link" onclick="resetSenha()">🔑 Esqueci minha senha</span>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
        getAuth,
        createUserWithEmailAndPassword,
        signInWithEmailAndPassword,
        sendPasswordResetEmail,
        signInWithPopup,
        GoogleAuthProvider
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCpj2IUjoCXTVZ5-Qubh7GkGsJ1xbCF-jM",
        authDomain: "devjhonny-b33c4.firebaseapp.com",
        projectId: "devjhonny-b33c4"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // ===== PARTÍCULAS =====
    particlesJS("particles-js", {
        particles: {
            number: { value: 80 },
            color: { value: ["#00fff2", "#ff0080", "#00ff88"] },
            shape: { type: "circle" },
            opacity: { value: 0.5, random: true },
            size: { value: 3, random: true },
            move: { enable: true, speed: 2, random: true },
            line_linked: { enable: true, distance: 150, color: "#00fff2", opacity: 0.2 }
        }
    });

    // ===== CAPTCHA =====
    let captcha;
    function gerarCaptcha(){
        captcha = Math.random().toString(36).substring(2,7);
        document.getElementById("captchaText").innerText = captcha;
    }
    gerarCaptcha();

    // ===== CADASTRAR =====
    window.cadastrar = function() {
        let email = document.getElementById("email").value;
        let senha = document.getElementById("senha").value;
        let confirmar = document.getElementById("confirmar").value;
        let captchaInput = document.getElementById("captchaInput").value;

        if(senha !== confirmar){
            alert("As senhas não coincidem");
            return;
        }
        if(captchaInput !== captcha){
            alert("Captcha incorreto");
            gerarCaptcha();
            return;
        }

        createUserWithEmailAndPassword(auth, email, senha)
        .then(() => {
            alert("Conta criada com sucesso!");
            window.location.href = "paginavendas.html";
        })
        .catch(error => {
            alert(error.message);
        });
    };

    // ===== LOGIN =====
    window.login = function() {
        let email = document.getElementById("email").value;
        let senha = document.getElementById("senha").value;

        signInWithEmailAndPassword(auth, email, senha)
        .then(() => {
            window.location.href = "painel.html";
        })
        .catch(error => {
            alert(error.message);
        });
    };

    // ===== LOGIN GOOGLE =====
    window.loginGoogle = function() {
        signInWithPopup(auth, provider)
        .then((result) => {
            window.location.href = "painel.html";
        })
        .catch((error) => {
            alert("Erro no login: " + error.message);
        });
    };

    // ===== ESQUECI SENHA =====
    window.resetSenha = function() {
        let email = document.getElementById("email").value;
        if(!email){
            alert("Digite seu email primeiro");
            return;
        }
        sendPasswordResetEmail(auth, email)
        .then(() => {
            alert("Email de recuperação enviado! Verifique sua caixa de spam");
        })
        .catch(error => {
            alert(error.message);
        });
    };

</script>

</body>
</html>
